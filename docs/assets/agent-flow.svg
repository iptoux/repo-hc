<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="380" viewBox="0 0 1400 380" role="img" aria-labelledby="title desc">
  <title id="title">Agent flow</title>
  <desc id="desc">Linear agent workflow from repository scan to verification.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path class="arrow" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>
  <style>
    .panel {
      fill: rgba(255, 255, 255, 0.72);
      stroke: #d0d7de;
    }
    .card {
      fill: rgba(246, 248, 250, 0.8);
      stroke: #d0d7de;
    }
    .title { fill: #24292f; }
    .subtitle { fill: #57606a; }
    .body { fill: #24292f; }
    .arrow-line, .arrow { fill: #0969da; stroke: #0969da; }
    .h1 { fill: #1a7f37; }
    .h2 { fill: #0969da; }
    .h3 { fill: #9a6700; }
    .h4 { fill: #8250df; }
    .h5 { fill: #bc4c00; }
    .h6 { fill: #0550ae; }
    .h7 { fill: #0a7b83; }

    @media (prefers-color-scheme: dark) {
      .panel {
        fill: rgba(22, 27, 34, 0.8);
        stroke: #30363d;
      }
      .card {
        fill: rgba(13, 17, 23, 0.7);
        stroke: #30363d;
      }
      .title { fill: #f0f6fc; }
      .subtitle { fill: #8b949e; }
      .body { fill: #c9d1d9; }
      .arrow-line, .arrow { fill: #58a6ff; stroke: #58a6ff; }
      .h1 { fill: #3fb950; }
      .h2 { fill: #58a6ff; }
      .h3 { fill: #d29922; }
      .h4 { fill: #a371f7; }
      .h5 { fill: #ffa657; }
      .h6 { fill: #79c0ff; }
      .h7 { fill: #39c5cf; }
    }
  </style>

  <rect class="panel" x="20" y="20" width="1360" height="340" rx="12" />

  <text class="title" x="50" y="62" font-size="30" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700">repo-hc Agent Flow</text>
  <text class="subtitle" x="50" y="90" font-size="16" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">Structured execution from discovery to final verification.</text>

  <rect class="card" x="45" y="140" width="170" height="150" rx="10" />
  <text class="h1" x="61" y="176" font-size="16" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700">1. Scan Repo</text>
  <text class="body" x="61" y="202" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">Read current state,</text>
  <text class="body" x="61" y="222" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">files, and constraints.</text>

  <rect class="card" x="235" y="140" width="170" height="150" rx="10" />
  <text class="h2" x="251" y="176" font-size="16" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700">2. Create Plan</text>
  <text class="body" x="251" y="202" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">Define scope and</text>
  <text class="body" x="251" y="222" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">validation steps.</text>

  <rect class="card" x="425" y="140" width="170" height="150" rx="10" />
  <text class="h3" x="441" y="176" font-size="16" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700">3. Create Branch</text>
  <text class="body" x="441" y="202" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">Isolate changes on</text>
  <text class="body" x="441" y="222" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">feature branch.</text>

  <rect class="card" x="615" y="140" width="170" height="150" rx="10" />
  <text class="h4" x="631" y="176" font-size="16" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700">4. Implement Plan</text>
  <text class="body" x="631" y="202" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">Apply focused and</text>
  <text class="body" x="631" y="222" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">modular edits.</text>

  <rect class="card" x="805" y="140" width="170" height="150" rx="10" />
  <text class="h5" x="821" y="176" font-size="16" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700">5. Update Docu</text>
  <text class="body" x="821" y="202" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">Keep docs aligned</text>
  <text class="body" x="821" y="222" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">with behavior.</text>

  <rect class="card" x="995" y="140" width="170" height="150" rx="10" />
  <text class="h6" x="1011" y="176" font-size="16" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700">6. Run Tests</text>
  <text class="body" x="1011" y="202" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">Execute checks and</text>
  <text class="body" x="1011" y="222" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">capture outcomes.</text>

  <rect class="card" x="1185" y="140" width="170" height="150" rx="10" />
  <text class="h7" x="1201" y="176" font-size="16" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700">7. Verify</text>
  <text class="body" x="1201" y="202" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">Confirm expected</text>
  <text class="body" x="1201" y="222" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">result quality.</text>

  <line class="arrow-line" x1="215" y1="215" x2="235" y2="215" stroke-width="3" marker-end="url(#arrow)" />
  <line class="arrow-line" x1="405" y1="215" x2="425" y2="215" stroke-width="3" marker-end="url(#arrow)" />
  <line class="arrow-line" x1="595" y1="215" x2="615" y2="215" stroke-width="3" marker-end="url(#arrow)" />
  <line class="arrow-line" x1="785" y1="215" x2="805" y2="215" stroke-width="3" marker-end="url(#arrow)" />
  <line class="arrow-line" x1="975" y1="215" x2="995" y2="215" stroke-width="3" marker-end="url(#arrow)" />
  <line class="arrow-line" x1="1165" y1="215" x2="1185" y2="215" stroke-width="3" marker-end="url(#arrow)" />
</svg>
